name: Feature request
description: Suggest an SDK improvement
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow is difficult or unsupported today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the API or behavior you would like.
    validations:
      required: true
  - type: input
    id: runtime
    attributes:
      label: Runtime and framework
      placeholder: "Node 20, Python 3.12, iOS 17, Laravel 11"
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional context about current workarounds.
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: This request does not require exposing secrets, private customer data, or internal system details.
          required: true
