// Standard React Native module Gradle build file. Picked up by RN
// autolinking via ../../react-native.config.js (sourceDir).
buildscript {
  ext.kotlin_version = rootProject.ext.has('kotlinVersion')
    ? rootProject.ext.get('kotlinVersion')
    : (rootProject.ext.has('kotlin_version') ? rootProject.ext.get('kotlin_version') : '1.9.22')
  repositories {
    google()
    mavenCentral()
  }
  dependencies {
    classpath 'com.android.tools.build:gradle:8.2.1'
  }
}

apply plugin: 'com.android.library'

android {
  namespace 'io.allstak.rn'
  compileSdkVersion safeExtGet('compileSdkVersion', 34)

  defaultConfig {
    minSdkVersion safeExtGet('minSdkVersion', 21)
    targetSdkVersion safeExtGet('targetSdkVersion', 34)

    // NDK / native-signal crash handler (liballstak_signal.so). Built via the
    // CMakeLists.txt below. AllStakNdk loads the .so with System.loadLibrary and
    // degrades gracefully (JVM-only capture) if it is absent or fails to load,
    // so consumers without an NDK installed are unaffected.
    externalNativeBuild {
      cmake {
        cppFlags "-std=c++14"
      }
    }
  }

  // Build the C/C++ signal handler with the package. CMake + the NDK ship with
  // the standard Android Gradle plugin used by RN apps; if the NDK is not
  // resolvable in a given environment the host app simply omits the .so and the
  // SDK falls back to JVM-only crash capture (no build break for JS-only / Expo
  // Go consumers since this module is only compiled when the native project is).
  externalNativeBuild {
    cmake {
      path "src/main/cpp/CMakeLists.txt"
      version safeExtGet('cmakeVersion', '3.22.1')
    }
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_17
    targetCompatibility JavaVersion.VERSION_17
  }
}

repositories {
  google()
  mavenCentral()
}

dependencies {
  implementation 'com.facebook.react:react-android:+'
}

def safeExtGet(prop, fallback) {
  rootProject.ext.has(prop) ? rootProject.ext.get(prop) : fallback
}
